<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Interview Questions</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#14001f,#000000);
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.back-btn{
position:absolute;
top:20px;
right:30px;
text-decoration:none;
color:white;
border:1px solid #a855f7;
padding:8px 16px;
border-radius:6px;
font-size:14px;
transition:0.3s;
}

.back-btn:hover{
background:#a855f7;
}

.question-card{
width:700px;
height:480px;
background:rgba(0,0,0,0.65);
border:1px solid #a855f7;
border-radius:10px;
padding:30px;
text-align:center;
box-shadow:0 0 20px rgba(168,85,247,0.3);
overflow-y:auto;
}

.question-card h2{
margin-bottom:15px;
font-size:24px;
color:#c084fc;
}

textarea{
width:95%;
padding:10px;
border-radius:6px;
border:none;
outline:none;
margin-top:8px;
resize:none;
font-size:14px;
}

button{
background:#7c3aed;
border:none;
color:white;
padding:10px 22px;
border-radius:6px;
cursor:pointer;
font-size:14px;
margin-top:10px;
}

button:hover{
background:#9333ea;
}

.question-block{
border:1px solid #a855f7;
border-radius:8px;
padding:10px;
margin-top:15px;
background:rgba(0,0,0,0.45);
}

</style>

</head>

<body>

<a href="/dashboard" class="back-btn">Back to Dashboard</a>

<div class="question-card">

<h2>❓ AI Generated Interview Questions</h2>

<textarea id="jobDescInput" rows="3"
placeholder="Enter job description for better questions"></textarea>

<br>

<button onclick="generateQuestions()">Generate Questions</button>

<div id="questionList"></div>

</div>

<script>

function generateQuestions(){

let jd = document.getElementById("jobDescInput").value;

fetch("/generate_questions",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({job_description:jd})
})
.then(res=>res.json())
.then(data=>{

let list = document.getElementById("questionList");
list.innerHTML="";

data.questions.forEach(q=>{

let div = document.createElement("div");

div.className="question-block";

div.innerHTML = `
<p><b>${q}</b></p>
<textarea class="answerBox" placeholder="Write your answer"></textarea>
<button onclick="analyzeThisAnswer(this)">Analyze Answer</button>
<p class="analysisResult"></p>
`;

list.appendChild(div);

});

});

}
function analyzeThisAnswer(btn){

let textarea = btn.previousElementSibling
let answer = textarea.value

fetch("/analyze_answer",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({answer:answer})
})
.then(res=>res.json())
.then(data=>{

let result = btn.nextElementSibling

result.innerText =
"Score: " + data.score + "% | Grammar: " + data.grammar +
" | Confidence: " + data.confidence +
" | Clarity: " + data.clarity

})

}
</script>

</body>
</html>
